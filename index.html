<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>متابعة يومية</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-eyebrow">متابعة يومية</div>
      <div class="header-date" id="headerDate"></div>
    </header>

    <!-- Hero: Net Salary -->
    <section class="hero">
      <div class="hero-label">صافي المستحق</div>
      <div class="hero-amount" id="salary">٠</div>
      <div class="hero-unit">جنيه</div>
      <div class="hero-period" id="periodText"></div>
    </section>

    <!-- Stats Row -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-num" id="daysCount">٠</span>
        <span class="stat-lbl">يوم حضور</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <span class="stat-num absent-num" id="absentDays">٠</span>
        <span class="stat-lbl">يوم غياب</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <span class="stat-num" id="remainingDays">٠</span>
        <span class="stat-lbl">يوم للقبض</span>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-labels">
        <span id="progressPct">٠٪</span>
        <span>مضى من الفترة</span>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="actions">
      <button class="btn-attend" onclick="markAttendance()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        تسجيل الحضور
      </button>
      <button class="btn-cancel" onclick="removeToday()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
        إلغاء اليوم
      </button>
    </div>

    <button class="btn-holiday" id="btnTodayHoliday" style="margin-bottom: 14px;" onclick="markTodayAsHoliday()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
      تسجيل اليوم كإجازة رسمية
    </button>

    <!-- Toast Message -->
    <div class="toast" id="message" role="alert" aria-live="polite"></div>

    <!-- Calendar -->
    <section class="section">
      <div class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        تقويم الشهر
      </div>
      <div class="cal-headers">
        <span>أحد</span><span>إثنين</span><span>ثلاثاء</span><span>أربعاء</span><span>خميس</span><span>جمعة</span><span>سبت</span>
      </div>
      <div class="cal-grid" id="calendar"></div>

      <!-- Legend -->
      <div class="cal-legend">
        <span class="legend-item"><span class="legend-dot present-dot"></span>حضور</span>
        <span class="legend-item"><span class="legend-dot absent-dot"></span>غياب</span>
        <span class="legend-item"><span class="legend-dot holiday-dot"></span>إجازة رسمية</span>
        <span class="legend-item"><span class="legend-dot weekend-dot"></span>إجازة أسبوعية</span>
      </div>

      <button id="btnSaveSelected" class="btn-save" style="display: none; margin-top: 16px;"
        onclick="saveSelectedDays()">تسجيل الأيام المحددة</button>

      <button id="btnCancelSelected" class="btn-cancel"
        style="display: none; margin-top: 8px; width: 100%; justify-content: center;"
        onclick="cancelSelectedDays()">إلغاء الأيام المحددة</button>

      <!-- زر الإجازة الرسمية -->
      <button id="btnMarkHoliday" class="btn-holiday" style="display: none; margin-top: 8px;"
        onclick="markSelectedAsHoliday()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
        </svg>
        تسجيل كإجازة رسمية
      </button>

      <!-- استبدل أو أضف هذا الزر بجانب زر الإجازة الرسمية -->
      <button id="btnCancelHolidays" class="btn-cancel"
        style="display: none; margin-top: 8px; width: 100%; justify-content: center; border-color: #F5C842; color: #A07000;"
        onclick="cancelSelectedHolidays()">
        إلغاء الإجازات المحددة
      </button>
    </section>

    <!-- Settings -->
    <section class="section">
      <div class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
        الإعدادات
      </div>
      <div class="fields">
        <div class="field">
          <label for="dailyRate">قيمة اليومية</label>
          <div class="input-wrap">
            <input id="dailyRate" type="number" min="1" placeholder="٢٢٥">
            <span class="input-unit">جنيه</span>
          </div>
        </div>
        <div class="field">
          <label for="deductionInput">السلف والخصومات</label>
          <div class="input-wrap">
            <input id="deductionInput" type="number" min="0" placeholder="٠">
            <span class="input-unit">جنيه</span>
          </div>
        </div>
      </div>
      <button class="btn-save" onclick="saveSettings()">حفظ الإعدادات</button>
    </section>

    <!-- Footer / Copyright -->
    <footer class="footer">
      <div class="footer-line"></div>
      <div class="footer-content">
        <span class="footer-brand">متابعة يومية</span>
        <span class="footer-dot">·</span>
        <span class="footer-copy">Developed by <strong>Ibrahim Mostafa Mohamed</strong></span>
      </div>
      <div class="footer-year">© ٢٠٢٥ — جميع الحقوق محفوظة</div>
    </footer>

  </div>

  <script src="script.js"></script>
</body>

</html>
